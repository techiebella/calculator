<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern Responsive Calculator App">
    <title>ByteForge Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <!-- Calculator -->
        <div class="calculator">

            <div class="header">
                <h2 class="title">Calculator</h2>

                <button id="scientificToggle" class="theme-btn">🧮</button>
                <button id="themeToggle" class="theme-btn">
                    🌙
                </button>
            </div>

            <input type="text" id="display" placeholder="0" readonly aria-label="Calculator Display">
            <div class="scientific-buttons" id="scientificButtons">

                <button class="operator">(</button>
                <button class="operator">)</button>
                <button class="operator">sin</button>
                <button class="operator">cos</button>

                <button class="operator">tan</button>
                <button class="operator">π</button>
                <button class="operator">√</button>
                <button class="operator">x²</button>

                <button class="operator">xʸ</button>
                <button class="operator">!</button>

            </div>
            <div class="buttons">

                <!-- Row 1 -->
                <button class="clear">C</button>
                <button>⌫</button>
                <button class="operator">%</button>
                <button class="operator">÷</button>

                <!-- Row 2 -->
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">×</button>

                <!-- Row 3 -->
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>

                <!-- Row 4 -->
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">+</button>

                <!-- Row 5 -->
                <button class="zero">0</button>
                <button>.</button>
                <button class="equal">=</button>

            </div>

            <div class="footer">
                <p></p>
            </div>

        </div>

        <!-- History Panel -->
        <div class="history-panel">

            <div class="history-header">
                <h3>History</h3>

                <button id="clearHistory">
                    Clear
                </button>
            </div>

            <ul id="historyList"></ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
